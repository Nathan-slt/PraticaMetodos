    <main class="banner">

        <div class="banner-text">
            <h1>Consoles que marcam gerações</h1>
            <p>OS videogames não são apenas tecnologia comercializada. Na verdade, os jogos possuem a capacidade de desevolver habilidades e gerar memórias.</p>

    <h2 class="consoles">Catálogo de Consoles</h2>
    <section>
        <div class="card">
            <div class="card-game">
                <img src="assets/images/i413576.png" alt="">
                <h2>PlayStation 2</h2>
                <!-- <p>Lançado pela Sony em 2000, é o console de videogame mais vendido da história, com mais de 160 milhões de unidades. Destacou-se pela retrocompatibilidade com o PS1, leitor de DVD integrado e uma vasta biblioteca de jogos, além do seu processador Emotion Engine de 128 bits.</p> -->
            </div>
        </div>

        <div class="card">
            <div class="card-game">
                <img src="assets/images/set-of-console-game-device-handheld-portable-free-png.png"  width="700rem" height="auto" alt="">
                <h2>Nintendo Switch</h2>
                <!-- <p>É um console híbrido versátil lançado em 2017, funcionando como dispositivo portátil, na TV via dock ou em modo de mesa com controles Joy-Con destacáveis. Disponível nas versões Padrão (V2), OLED (tela superior de 7") e Lite (portátil dedicado), destaca-se por exclusivos como Mario, Zelda e Pokémon. Possui memória expansível e bateria com duração de 4 a 9 horas. </p> -->
            </div>
        </div>

        <div class="card">
            <div class="card-game">
                <img src="assets/images/xbox_360_4gb_seminovo_1259_1_d6bae2d4ea0fcfa7bb3ee1b2bad1224d.png" alt="">
                <h2>Xbox 360</h2>
                <!-- <p>O Xbox 360, lançado pela Microsoft em 2005 como parte da 7ª geração, é um console de jogos icônico com CPU PowerPC de 3 núcleos a 3.2 GHz, 512MB de RAM e GPU ATI Xenos. Disponível nos modelos Fat, Slim e Super Slim, oferece HDs de 4GB a 500GB, suporte a DVD, Xbox Live e integração com o Kinect.</p> -->
            </div>
        </div>

        <div class="card">
            <div class="card-game">
                <img src="assets/images/n64-console-set-c637a4a088cbb9b91517099951608306-1024-1024.png" alt="">
                <h2>Nintendo 64</h2>
                <!-- <p>O Nintendo 64, lançado em 1996, foi um console de 64 bits revolucionário, sendo pioneiro nos gráficos 3D, no uso do controle com joystick analógico e na funcionalidade de vibração. Utilizando cartuchos, destacou-se por jogos icônicos como Super Mario 64.</p> -->
            </div>
        </div>
    </section>
