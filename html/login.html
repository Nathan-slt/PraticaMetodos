<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bebos games</title>
	<link rel="shortcut icon" href="../assets/images/BebosGame.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
    <div class="main">  	
		<input type="checkbox" id="chk" aria-hidden="true">

			<div class="signup">
				<form onsubmit="cadastrarUsuario(event)"> 
					<label for="chk" aria-hidden="true">Cadastro</label>
					<p id="mensagem1"></p>
    				<input type="text" name="txt" id="nome" placeholder="Nome de usuário" required="">
 					<input type="email" name="email" id="email" placeholder="Email" required="">
  					<input type="tel" name="broj" id="telefone" placeholder="Telefone" required="">
    				<input type="password" name="pswd" id="senha" placeholder="Senha" required=""> 
    				<button type="submit">Cadastrar</button>
				</form>
			</div>

			<div class="login">
				<form onsubmit="PUTdados(event)">
					<label for="chk" aria-hidden="true">Atualizar Dados</label>
					<p id="mensagem2"></p>
					<input type="email" name="email" placeholder="Email" required="" id="editarEmail">
					<input type="password" name="pswd" placeholder="Password" required="" id="editarSenha">
					<a href="index.html">
						<button>Atualizar</button>
					</a>
				</form>
			</div>
	</div>

    <!-- <script src="../js/get.js"></script> -->
	<script src="../js/post.js"></script>
	<script src="../js/put.js"></script>
</body>

</html>
