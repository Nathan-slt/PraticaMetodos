<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bebos games</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
    <div class="main">  	
		<input type="checkbox" id="chk" aria-hidden="true">

			<div class="signup">
				<form>
					<label for="chk" aria-hidden="true">Cadastro</label>
					<input type="text" name="txt" placeholder="Nome de usuário" required="">
					<input type="email" name="email" placeholder="Email" required="">
          			<input type="number" name="broj" placeholder="Telefone" required="">
					<input type="password" name="pswd" placeholder="Senha" required="">
					<a href="index.html"> 
						<button>Cadastro</button>
					</a>
				</form>
			</div>

			<div class="login">
				<form>
					<label for="chk" aria-hidden="true">Login</label>
					<input type="email" name="email" placeholder="Email" required="">
					<input type="password" name="pswd" placeholder="Password" required="">
					<a href="index.html">
						<button>Login</button>
					</a>
				</form>
			</div> 
	</div>
</body>

</html>
